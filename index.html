<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniPro v3.0 | Advanced Neural Merit Predictor</title>

    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js">
    </script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js">
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js">
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js">
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    animation: {
                        'gradient-x': 'gradient-x 20s ease infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                        'scale-in': 'scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'typing-dot': 'typingDot 1.2s ease-in-out infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' }
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-12px)' }
                        },
                        'slideUp': {
                            '0%': { transform: 'translateY(100%)', opacity: 0 },
                            '100%': { transform: 'translateY(0)', opacity: 1 }
                        },
                        'scaleIn': {
                            '0%': { transform: 'scale(0.95)', opacity: 0 },
                            '100%': { transform: 'scale(1)', opacity: 1 }
                        },
                        'typingDot': {
                            '0%, 60%, 100%': { transform: 'scale(0.6)', opacity: 0.3 },
                            '30%': { transform: 'scale(1)', opacity: 1 }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #050505;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(20, 184, 166, 0.1), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(99, 102, 241, 0.1), transparent 25%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
        }
        .glass-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        select option {
            background-color: #0f172a;
            color: white;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.4);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(20, 184, 166, 0.5);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(20, 184, 166, 0.9);
        }

        .chat-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .drag-over {
            border: 2px dashed #6366f1 !important;
            background: rgba(99, 102, 241, 0.1) !important;
            transform: scale(1.02);
        }
        .chart-bar {
            transition: height 1s ease-out;
        }

        .message-code {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 8px 12px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            margin: 6px 0;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .message-code code {
            color: #a5b4fc;
        }

        .typing-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #818cf8;
            animation: typingDot 1.2s ease-in-out infinite;
        }
        .typing-dot:nth-child(2) {
            animation-delay: 0.15s;
        }
        .typing-dot:nth-child(3) {
            animation-delay: 0.3s;
        }

        .model-selector {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 4px 10px;
            color: #a5b4fc;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }
        .model-selector:hover {
            border-color: rgba(165, 180, 252, 0.4);
            background: rgba(99, 102, 241, 0.1);
        }
        .model-selector option {
            background: #0f172a;
            color: white;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, memo, useRef } = React;

        // --- Core Logic ---
        const calculateProbability = (userRank, cutoff) => {
            if (!userRank || userRank <= 0) return { prob: 0, status: "Invalid", color: "text-gray-500", bg: "bg-gray-500/10",
                border: "border-gray-500/30", variance: 0 };
            const ratio = userRank / cutoff;
            const variance = cutoff - userRank;
            let result = { prob: 0, status: "Unlikely", color: "text-gray-500", bg: "bg-gray-500/10",
                border: "border-gray-500/30", type: 'none', variance };

            if (ratio <= 0.60) result = { prob: 99, status: "Guaranteed", color: "text-emerald-400", bg: "bg-emerald-400/10",
                    border: "border-emerald-400/30", type: 'safe', variance };
            else if (ratio <= 0.85) result = { prob: 88, status: "Highly Likely", color: "text-green-400",
                    bg: "bg-green-400/10", border: "border-green-400/30", type: 'safe', variance };
            else if (ratio <= 0.95) result = { prob: 72, status: "Likely", color: "text-lime-400", bg: "bg-lime-400/10",
                    border: "border-lime-400/30", type: 'safe', variance };
            else if (ratio <= 1.00) result = { prob: 55, status: "Borderline", color: "text-yellow-400",
                    bg: "bg-yellow-400/10", border: "border-yellow-400/30", type: 'borderline', variance };
            else if (ratio <= 1.05) result = { prob: 35, status: "Waiting List", color: "text-orange-400",
                    bg: "bg-orange-400/10", border: "border-orange-400/30", type: 'risk', variance };
            else if (ratio <= 1.15) result = { prob: 12, status: "Low Chance", color: "text-red-400", bg: "bg-red-400/10",
                    border: "border-red-400/30", type: 'risk', variance };

            return result;
        };

        // --- Reusable UI Components ---
        const Toast = ({ message, type, onClose }) => ( <
            div className = { `fixed bottom-6 left-1/2 -translate-x-1/2 md:translate-x-0 md:left-auto md:right-6 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 z-[60] animate-slide-up ${
                type === 'success' ? 'bg-emerald-500/20 text-emerald-100 border border-emerald-500/50 backdrop-blur-xl' : 
                type === 'error' ? 'bg-red-500/20 text-red-100 border border-red-500/50 backdrop-blur-xl' :
                'bg-indigo-500/20 text-indigo-100 border border-indigo-500/50 backdrop-blur-xl'
            }` } >
                <
                span className = "material-symbols-rounded" > { type === 'success' ? 'check_circle' : type === 'error' ? 'error' :
                        'info' } < /span> <
                p className = "font-medium text-sm whitespace-nowrap" > { message } < /p> <
                button onClick = { onClose } className = "ml-2 hover:opacity-70" > < span className = "material-symbols-rounded text-sm block" > close < /span></button >
                <
                /div>
            );

            // --- ENHANCED AI Chat Widget with Model Selection & Advanced Features ---
            const AIChatWidget = () => {
                const [isOpen, setIsOpen] = useState(false);
                const [messages, setMessages] = useState(() => {
                    const saved = localStorage.getItem('unipro_chat_history');
                    if (saved) {
                        try { return JSON.parse(saved); } catch (e) {}
                    }
                    return [{ sender: 'ai', text: "Hello! I'm the public AI assistant for UniPro. How can I help you map your academic roadmap today?" }];
                });
                const [input, setInput] = useState('');
                const [isLoading, setIsLoading] = useState(false);
                const [selectedModel, setSelectedModel] = useState(() => {
                    return localStorage.getItem('unipro_chat_model') || 'openai';
                });
                const [showModelInfo, setShowModelInfo] = useState(false);
                const messagesEndRef = useRef(null);

                const availableModels = [
                    { id: 'openai', label: 'GPT-4 (Default)', description: 'Best for complex reasoning & detailed answers' },
                    { id: 'claude-3-haiku', label: 'Claude 3 Haiku', description: 'Fast, concise, and cost-efficient' },
                    { id: 'llama-3-8b', label: 'Llama 3 8B', description: 'Open-source, balanced performance' },
                    { id: 'mistral-7b', label: 'Mistral 7B', description: 'Lightweight & fast for routine queries' },
                    { id: 'gemini-1.5-flash', label: 'Gemini 1.5 Flash', description: 'Google\'s efficient multimodal model' },
                ];

                const scrollToBottom = () => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });

                useEffect(() => { scrollToBottom(); }, [messages, isLoading]);
                useEffect(() => {
                    localStorage.setItem('unipro_chat_history', JSON.stringify(messages));
                }, [messages]);
                useEffect(() => {
                    localStorage.setItem('unipro_chat_model', selectedModel);
                }, [selectedModel]);

                const handleSend = async () => {
                    if (!input.trim()) return;
                    const userMsg = input.trim();
                    const newMessages = [...messages, { sender: 'user', text: userMsg }];
                    setMessages(newMessages);
                    setInput('');
                    setIsLoading(true);

                    try {
                        // Use Pollinations.ai public API with model selection
                        const systemPrompt = "You are an academic AI assistant for UniPro, a university admission predictor. Answer briefly, helpfully, and accurately. Use markdown for formatting code or lists where appropriate.";
                        const fullPrompt =
                            `System: ${systemPrompt}\n\nUser: ${userMsg}\n\nAssistant:`;

                        // Pollinations.ai supports model parameter for anonymous users
                        const url =
                            `https://text.pollinations.ai/${encodeURIComponent(fullPrompt)}?model=${selectedModel}`;

                        const res = await fetch(url);

                        if (!res.ok) throw new Error(`HTTP ${res.status}`);

                        const text = await res.text();

                        // Clean up response (remove trailing "Assistant:" if present)
                        let cleaned = text.trim();
                        if (cleaned.startsWith('Assistant:')) cleaned = cleaned.substring(10).trim();

                        setMessages(prev => [...prev, { sender: 'ai', text: cleaned }]);
                    } catch (error) {
                        console.error('Pollinations API Error:', error);
                        setMessages(prev => [...prev, {
                            sender: 'ai',
                            text: `⚠️ Neural link disconnected. The public AI service is currently unreachable. (Model: ${selectedModel})\n\nTry switching to another model or try again later.`
                        }]);
                    } finally {
                        setIsLoading(false);
                    }
                };

                const handleClearChat = () => {
                    if (messages.length > 1 || messages[0]?.sender !== 'ai') {
                        setMessages([{ sender: 'ai', text: "Chat cleared. How can I help you with your academic roadmap?" }]);
                        localStorage.removeItem('unipro_chat_history');
                    }
                };

                const handleKeyPress = (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        handleSend();
                    }
                };

                const renderMessage = (msg) => {
                    // Simple markdown-like formatting for code blocks and bold
                    let text = msg.text;
                    const parts = [];
                    let current = text;
                    let lastIndex = 0;

                    // Very basic markdown rendering - just safe HTML
                    let formatted = text
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\`\`\`(.*?)\`\`\`/gs, '<div class="message-code"><code>$1</code></div>')
                        .replace(/\`(.*?)\`/g, '<code style="background:rgba(255,255,255,0.08);padding:2px 6px;border-radius:4px;font-size:0.85em;">$1</code>')
                        .replace(/\n/g, '<br>');

                    return <div dangerouslySetInnerHTML = { { __html: formatted } }
                    />;
                };

                const currentModelLabel = availableModels.find(m => m.id === selectedModel)?.label || selectedModel;

                return ( <
                    div className = "fixed bottom-6 right-6 z-50 flex flex-col items-end" > {
                        isOpen && ( <
                            div className = "bg-[#09090b]/95 backdrop-blur-xl border border-white/10 rounded-2xl w-[340px] md:w-[400px] h-[520px] mb-4 shadow-2xl flex flex-col overflow-hidden animate-scale-in" >
                            <
                            div className = "bg-indigo-600/20 border-b border-white/5 p-4 flex justify-between items-center flex-shrink-0" >
                            <
                            div className = "flex items-center gap-2" >
                            <
                            span className = "material-symbols-rounded text-indigo-400" > robot_2 < /span> <
                            div >
                            <
                            h3 className = "font-bold text-white text-sm" > Public AI Assistant < /h3> <
                            p className = "text-[10px] text-indigo-300" > Powered by Open Neural Nets • Free < /p> <
                            /div> <
                            /div> <
                            div className = "flex items-center gap-2" >
                            <
                            button onClick = { handleClearChat }
                            className = "text-gray-400 hover:text-white p-1 rounded-lg hover:bg-white/5 transition-colors"
                            title = "Clear chat" >
                            <
                            span className = "material-symbols-rounded text-[18px]" > delete_sweep < /span> <
                            /button> <
                            button onClick = {
                                () => setIsOpen(false) }
                            className = "text-gray-400 hover:text-white p-1 rounded-lg hover:bg-white/5 transition-colors" >
                            <
                            span className = "material-symbols-rounded" > close < /span> <
                            /button> <
                            /div> <
                            /div>

                            <
                            div className = "flex-1 overflow-y-auto p-4 flex flex-col gap-3 chat-scrollbar" > {
                                messages.map((msg, i) => ( <
                                    div key = { i }
                                    className = { `max-w-[88%] p-3.5 rounded-2xl text-sm leading-relaxed ${
                                            msg.sender === 'user' 
                                            ? 'bg-indigo-500/90 text-white self-end rounded-tr-sm shadow-md' 
                                            : 'bg-white/5 text-gray-200 self-start rounded-tl-sm border border-white/5'
                                        }` } >
                                    {
                                        renderMessage(msg) } <
                                    /div>
                                ))
                            } {
                                isLoading && ( <
                                    div className = "bg-white/5 text-gray-400 self-start p-3 rounded-2xl rounded-tl-sm border border-white/5 text-sm flex items-center gap-2" >
                                    <
                                    span className = "typing-dot" > < /span> <
                                    span className = "typing-dot" > < /span> <
                                    span className = "typing-dot" > < /span> <
                                    span className = "text-[10px] text-gray-500 ml-1" > { currentModelLabel } < /span> <
                                    /div>
                                )
                            } <
                            div ref = { messagesEndRef }
                            /> <
                            /div>

                            <
                            div className = "p-3 border-t border-white/5 bg-black/20 flex-shrink-0" >
                            <
                            div className = "flex gap-2 mb-2" > {
                                showModelInfo && ( <
                                    div className = "absolute bottom-full left-0 mb-2 p-3 bg-[#0f172a] border border-indigo-500/30 rounded-xl text-xs text-gray-300 w-[280px] shadow-2xl z-10" >
                                    <
                                    p className = "font-bold text-indigo-300 mb-1" > Model: { currentModelLabel } < /p> <
                                    p > { availableModels.find(m => m.id === selectedModel)?.description ||
                                            'Fast, efficient public model.' } < /p> <
                                    p className = "mt-2 text-[10px] text-gray-500" > API: text.pollinations.ai • Free & Public < /p> <
                                    /div>
                                )
                            } <
                            select
                            value = { selectedModel }
                            onChange = {
                                (e) => setSelectedModel(e.target.value) }
                            className = "model-selector flex-1 min-w-0" >
                            {
                                availableModels.map(m => ( <
                                    option key = { m.id }
                                    value = { m.id } > { m.label } < /option>
                                ))
                            } <
                            /select> <
                            button onClick = {
                                () => setShowModelInfo(!showModelInfo) }
                            className = "text-indigo-400 hover:text-indigo-300 p-1.5 rounded-lg hover:bg-indigo-500/10 transition-colors relative" >
                            <
                            span className = "material-symbols-rounded text-[20px]" > info < /span> <
                            /button> <
                            /div> <
                            div className = "flex gap-2" >
                            <
                            textarea
                            value = { input }
                            onChange = {
                                (e) => setInput(e.target.value) }
                            onKeyDown = { handleKeyPress }
                            placeholder = "Ask anything about admissions..."
                            className = "flex-1 bg-white/5 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-400/50 resize-none min-h-[44px] max-h-[80px] transition-colors"
                            rows = "1"
                            /> <
                            button onClick = { handleSend }
                            disabled = { isLoading || !input.trim() }
                            className = "bg-indigo-500 hover:bg-indigo-400 text-white p-2.5 rounded-xl disabled:opacity-40 disabled:hover:bg-indigo-500 transition-all shadow-[0_0_12px_rgba(99,102,241,0.2)] flex-shrink-0" >
                            <
                            span className = "material-symbols-rounded text-[22px] block" > send < /span> <
                            /button> <
                            /div> <
                            /div> <
                            /div>
                        )
                    } {
                        !isOpen && ( <
                            button onClick = {
                                () => setIsOpen(true) }
                            className = "bg-indigo-600 hover:bg-indigo-500 text-white p-4 rounded-full shadow-[0_0_25px_rgba(79,70,229,0.5)] transition-transform hover:scale-110 flex items-center justify-center relative" >
                            <
                            span className = "material-symbols-rounded text-2xl" > forum < /span> <
                            span className = "absolute -top-1 -right-1 w-3 h-3 bg-emerald-400 rounded-full animate-pulse" > < /span> <
                            /button>
                        )
                    } <
                    /div>
                );
            };

            // --- NOTICE MODAL (unchanged) ---
            const NoticeModal = ({ isOpen, onClose }) => {
                const [activeTab, setActiveTab] = useState('all');
                const [notices, setNotices] = useState({ texts: [], images: [], pdfs: [] });
                const [loading, setLoading] = useState(true);

                useEffect(() => {
                    if (isOpen) {
                        setLoading(true);
                        fetch('./notice.json').then(res => res.json()).then(data => {
                            processNoticeData(data);
                        }).catch(err => {
                            const mockData = {
                                texts: [
                                    { id: 1, title: "Welcome to UniPro v3.0", content: "We are excited to launch the new neural prediction engine.",
                                        date: "2026-05-02" },
                                    { id: 2, title: "Server Maintenance Notice", content: "Systems will be down for 2 hours on Sunday for deep-learning updates.",
                                        date: "2026-04-28" }
                                ],
                                files: [
                                    "notice_admission_guidelines_2026.pdf",
                                    "notice_campus_map_new.jpg",
                                    "notice_fee_structure.pdf",
                                    "event_notice_hackathon.png",
                                    "random_file.txt"
                                ]
                            };
                            processNoticeData(mockData);
                        });
                    }
                }, [isOpen]);

                const processNoticeData = (data) => {
                    const texts = data.texts || [];
                    const files = data.files || [];
                    const validFiles = files.filter(f => f.toLowerCase().includes('notice'));
                    const images = validFiles.filter(f => f.match(/\.(jpeg|jpg|gif|png|webp)$/i)).map((url, i) => ({ id: `img-${i}`,
                        title: url, url: `./${url}`, type: 'image' }));
                    const pdfs = validFiles.filter(f => f.match(/\.(pdf)$/i)).map((url, i) => ({ id: `pdf-${i}`,
                        title: url, url: `./${url}`, type: 'pdf' }));
                    setNotices({ texts, images, pdfs });
                    setLoading(false);
                };

                if (!isOpen) return null;

                const allItems = [
                    ...notices.texts.map(t => ({ ...t, type: 'text' })),
                    ...notices.images,
                    ...notices.pdfs
                ];
                const displayItems = activeTab === 'all' ? allItems :
                    activeTab === 'texts' ? notices.texts.map(t => ({ ...t, type: 'text' })) :
                    activeTab === 'images' ? notices.images : notices.pdfs;

                return ( <
                    div className = "fixed inset-0 bg-black/80 backdrop-blur-md z-[55] flex items-center justify-center p-4" >
                    <
                    div className = "glass-panel w-full max-w-4xl h-[80vh] rounded-3xl relative shadow-2xl border border-white/10 flex flex-col animate-scale-in" >
                    <
                    button onClick = { onClose }
                    className = "absolute top-4 right-4 p-2 text-gray-400 hover:text-white bg-white/5 hover:bg-white/10 rounded-full transition-all z-10" > < span className = "material-symbols-rounded block" > close < /span></button >

                    <
                    div className = "p-6 border-b border-white/10" >
                    <
                    h2 className = "text-2xl font-bold text-white flex items-center gap-3" >
                    <
                    span className = "material-symbols-rounded text-yellow-400" > campaign < /span> Notice Board <
                    /h2> <
                    p className = "text-gray-400 text-sm mt-1" > Official texts, PDFs, and image circulars stored locally. < /p> <
                    div className = "flex gap-2 mt-6 overflow-x-auto" > {
                        ['all', 'texts', 'images', 'pdfs'].map(tab => ( <
                            button key = { tab }
                            onClick = {
                                () => setActiveTab(tab) }
                            className = { `px-4 py-2 rounded-xl text-sm font-semibold capitalize transition-all ${activeTab === tab ? 'bg-yellow-400/20 text-yellow-300 border border-yellow-400/30' : 'bg-white/5 text-gray-400 hover:text-white hover:bg-white/10'}` } >
                            { tab } <
                            /button>
                        ))
                    } <
                    /div> <
                    /div>

                    <
                    div className = "flex-1 overflow-y-auto p-6" > {
                        loading ? ( <
                            div className = "h-full flex items-center justify-center text-gray-400 animate-pulse" > < span className = "material-symbols-rounded animate-spin mr-2" > cyclone < /span> Fetching Directory...</div >
                        ) : displayItems.length === 0 ? ( <
                            div className = "h-full flex flex-col items-center justify-center text-gray-500" >
                            <
                            span className = "material-symbols-rounded text-6xl mb-2 opacity-50" > folder_off < /span> <
                            p > No notices found for this category. < /p> <
                            /div>
                        ) : ( <
                            div className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" > {
                                displayItems.map((item, idx) => ( <
                                    div key = { idx }
