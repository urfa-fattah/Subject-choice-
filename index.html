<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniPro v2 | Advanced Merit Rank Predictor</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    animation: {
                        'gradient-x': 'gradient-x 15s ease infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': {
                                'background-size': '200% 200%',
                                'background-position': 'left center'
                            },
                            '50%': {
                                'background-size': '200% 200%',
                                'background-position': 'right center'
                            }
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #064e3b, #0f172a);
            background-size: 400% 400%;
            animation: gradient-x 15s ease infinite;
            color: #ffffff;
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        select option {
            background-color: #0f172a;
            color: white;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const calculateProbability = (userRank, cutoff) => {
            if (!userRank || userRank <= 0) return 0;
            const ratio = userRank / cutoff;
            
            if (ratio <= 0.60) return { prob: 99, status: "Guaranteed", color: "text-emerald-400", bg: "bg-emerald-400/10", border: "border-emerald-400/30" };
            if (ratio <= 0.85) return { prob: 88, status: "Highly Likely", color: "text-green-400", bg: "bg-green-400/10", border: "border-green-400/30" };
            if (ratio <= 0.95) return { prob: 72, status: "Likely", color: "text-lime-400", bg: "bg-lime-400/10", border: "border-lime-400/30" };
            if (ratio <= 1.00) return { prob: 55, status: "Borderline", color: "text-yellow-400", bg: "bg-yellow-400/10", border: "border-yellow-400/30" };
            if (ratio <= 1.05) return { prob: 35, status: "Waiting List", color: "text-orange-400", bg: "bg-orange-400/10", border: "border-orange-400/30" };
            if (ratio <= 1.15) return { prob: 12, status: "Low Chance", color: "text-red-400", bg: "bg-red-400/10", border: "border-red-400/30" };
            
            return { prob: 0, status: "Unlikely", color: "text-gray-500", bg: "bg-gray-500/10", border: "border-gray-500/30" };
        };

        const App = () => {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [rank, setRank] = useState('');
            const [filterUni, setFilterUni] = useState('All');
            const [filterSubject, setFilterSubject] = useState('All');
            
            // Choice List State tied to LocalStorage
            const [choiceList, setChoiceList] = useState(() => {
                const saved = localStorage.getItem('unipro_choice_list');
                return saved ? JSON.parse(saved) : [];
            });

            // Fetch Data from JSON file
            useEffect(() => {
                fetch('./data.json')
                    .then(res => res.json())
                    .then(jsonData => {
                        setData(jsonData);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error("Failed to load data.json", err);
                        setLoading(false);
                    });
            }, []);

            // Save choice list to local storage whenever it changes
            useEffect(() => {
                localStorage.setItem('unipro_choice_list', JSON.stringify(choiceList));
            }, [choiceList]);

            // Dynamic filter options
            const uniqueUnis = useMemo(() => ["All", ...new Set(data.map(item => item.uni))], [data]);
            const uniqueSubjects = useMemo(() => ["All", ...new Set(data.map(item => item.dept).sort())], [data]);

            // Filter Engine
            const results = useMemo(() => {
                if (!rank || rank <= 0) return [];
                
                let filtered = data.map(item => {
                    const stats = calculateProbability(rank, item.cutoff);
                    return { ...item, ...stats };
                });

                // Apply Filters
                if (filterUni !== 'All') {
                    filtered = filtered.filter(item => item.uni === filterUni);
                }
                if (filterSubject !== 'All') {
                    filtered = filtered.filter(item => item.dept === filterSubject);
                }

                // Hide 0% probabilities if no specific filters applied to keep UI clean
                if (filterUni === 'All' && filterSubject === 'All') {
                    filtered = filtered.filter(item => item.prob > 0);
                }

                filtered.sort((a, b) => b.prob - a.prob || a.cutoff - b.cutoff);
                return filtered;
            }, [data, rank, filterUni, filterSubject]);

            // Handlers for Subject Choice List
            const handleAddToList = (item) => {
                if (!choiceList.some(c => c.uni === item.uni && c.dept === item.dept)) {
                    setChoiceList([...choiceList, { uni: item.uni, dept: item.dept }]);
                }
            };

            const handleRemoveFromList = (index) => {
                const newList = [...choiceList];
                newList.splice(index, 1);
                setChoiceList(newList);
            };

            const handleMove = (index, direction) => {
                if (direction === -1 && index === 0) return; // Cannot move up if first
                if (direction === 1 && index === choiceList.length - 1) return; // Cannot move down if last
                
                const newList = [...choiceList];
                const temp = newList[index];
                newList[index] = newList[index + direction];
                newList[index + direction] = temp;
                setChoiceList(newList);
            };

            const handleDownloadPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                // Add Headers
                doc.setFontSize(22);
                doc.setTextColor(15, 23, 42); // Dark slate color
                doc.text("My Subject Choice List", 14, 22);
                
                doc.setFontSize(11);
                doc.setTextColor(100, 116, 139);
                doc.text(`Generated by UniPro v2 | Total Choices: ${choiceList.length}`, 14, 30);

                const tableColumn = ["Serial", "University Name", "Subject/Department"];
                const tableRows = [];

                choiceList.forEach((choice, index) => {
                    const rowData = [
                        (index + 1).toString(),
                        choice.uni,
                        choice.dept
                    ];
                    tableRows.push(rowData);
                });

                doc.autoTable({
                    head: [tableColumn],
                    body: tableRows,
                    startY: 40,
                    theme: 'grid',
                    styles: { fontSize: 11, cellPadding: 4 },
                    headStyles: { fillColor: [139, 92, 246] }, // Tailwind purple-500
                    alternateRowStyles: { fillColor: [248, 250, 252] }
                });

                doc.save("UniPro_Subject_Choice_List.pdf");
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="flex flex-col items-center animate-pulse-slow">
                            <span className="material-symbols-rounded text-6xl text-cyan-400 mb-4 animate-spin">data_usage</span>
                            <h2 className="text-xl font-medium text-white tracking-widest uppercase">Initializing UniPro...</h2>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen px-4 py-12 md:px-8 max-w-7xl mx-auto flex flex-col items-center">
                    
                    {/* Header */}
                    <div className="text-center mb-10 animate-float">
                        <div className="inline-flex items-center justify-center p-3 mb-4 rounded-full glass-panel">
                            <span className="material-symbols-rounded text-4xl text-cyan-400">query_stats</span>
                        </div>
                        <h1 className="text-4xl md:text-6xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-teal-300 via-cyan-400 to-indigo-400">
                            UniPro v2
                        </h1>
                        <p className="text-gray-300 text-lg max-w-2xl mx-auto">
                            Advanced probability analytics. Predict your university & subject allocation instantly based on historic GST admission trends.
                        </p>
                    </div>

                    {/* Master Control Panel */}
                    <div className="w-full max-w-4xl glass-panel rounded-[2rem] p-6 md:p-8 mb-12 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-teal-400 via-cyan-500 to-indigo-500"></div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {/* Input: Rank */}
                            <div className="w-full relative group">
                                <label className="text-xs text-gray-400 uppercase tracking-wider mb-2 block ml-1">Merit Position</label>
                                <span className="material-symbols-rounded absolute left-4 top-[38px] text-gray-400 group-focus-within:text-cyan-400 transition-colors">
                                    social_leaderboard
                                </span>
                                <input 
                                    type="number" 
                                    placeholder="Enter Rank..."
                                    className="w-full bg-white/5 border border-white/10 rounded-2xl py-3 pl-12 pr-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-cyan-400/50 transition-all text-lg"
                                    value={rank}
                                    onChange={(e) => setRank(e.target.value)}
                                />
                            </div>

                            {/* Filter: University */}
                            <div className="w-full relative group">
                                <label className="text-xs text-gray-400 uppercase tracking-wider mb-2 block ml-1">Target University</label>
                                <span className="material-symbols-rounded absolute left-4 top-[38px] text-gray-400 group-focus-within:text-indigo-400 transition-colors pointer-events-none">
                                    account_balance
                                </span>
                                <select 
                                    className="w-full bg-white/5 border border-white/10 rounded-2xl py-3 pl-12 pr-10 text-white focus:outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all text-lg appearance-none cursor-pointer"
                                    value={filterUni}
                                    onChange={(e) => setFilterUni(e.target.value)}
                                >
                                    {uniqueUnis.map(uni => (
                                        <option key={uni} value={uni}>{uni}</option>
                                    ))}
                                </select>
                                <span className="material-symbols-rounded absolute right-4 top-[38px] text-gray-400 pointer-events-none">
                                    unfold_more
                                </span>
                            </div>

                            {/* Filter: Subject */}
                            <div className="w-full relative group">
                                <label className="text-xs text-gray-400 uppercase tracking-wider mb-2 block ml-1">Target Subject</label>
                                <span className="material-symbols-rounded absolute left-4 top-[38px] text-gray-400 group-focus-within:text-teal-400 transition-colors pointer-events-none">
                                    science
                                </span>
                                <select 
                                    className="w-full bg-white/5 border border-white/10 rounded-2xl py-3 pl-12 pr-10 text-white focus:outline-none focus:ring-2 focus:ring-teal-400/50 transition-all text-lg appearance-none cursor-pointer"
                                    value={filterSubject}
                                    onChange={(e) => setFilterSubject(e.target.value)}
                                >
                                    {uniqueSubjects.map(sub => (
                                        <option key={sub} value={sub}>{sub}</option>
                                    ))}
                                </select>
                                <span className="material-symbols-rounded absolute right-4 top-[38px] text-gray-400 pointer-events-none">
                                    unfold_more
                                </span>
                            </div>
                        </div>
                    </div>

                    {/* Choice List Maker Section */}
                    {choiceList.length > 0 && (
                        <div className="w-full max-w-6xl mb-12">
                            <div className="glass-panel rounded-[2rem] p-6 md:p-8 relative overflow-hidden shadow-[0_15px_40px_-15px_rgba(168,85,247,0.2)]">
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-fuchsia-400 via-purple-500 to-indigo-500"></div>
                                
                                <div className="flex flex-col md:flex-row items-start md:items-center justify-between mb-6 gap-4">
                                    <div>
                                        <h2 className="text-2xl font-semibold flex items-center gap-3 mb-1">
                                            <span className="material-symbols-rounded text-purple-400 p-2 bg-purple-400/10 rounded-lg">format_list_numbered</span>
                                            My Subject Choice List
                                        </h2>
                                        <p className="text-sm text-gray-400 ml-[52px]">Drag or click arrows to reorder your preferred subjects.</p>
                                    </div>
                                    <button 
                                        onClick={handleDownloadPDF}
                                        className="bg-gradient-to-r from-purple-500 to-indigo-500 hover:from-purple-400 hover:to-indigo-400 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 font-medium transition-all shadow-lg shadow-purple-500/20 active:scale-95"
                                    >
                                        <span className="material-symbols-rounded">picture_as_pdf</span>
                                        Download PDF
                                    </button>
                                </div>

                                <div className="flex flex-col gap-3">
                                    {choiceList.map((item, index) => (
                                        <div key={`${item.uni}-${item.dept}`} className="flex items-center gap-4 bg-white/5 border border-white/10 p-3 md:p-4 rounded-2xl hover:bg-white/10 transition-colors group">
                                            <div className="text-xl md:text-2xl font-bold text-white/20 w-8 text-center">{index + 1}</div>
                                            
                                            <div className="flex-1">
                                                <h3 className="text-base md:text-lg font-bold text-white">{item.dept}</h3>
                                                <p className="text-gray-400 text-xs md:text-sm">{item.uni}</p>
                                            </div>

                                            <div className="flex items-center gap-1 md:gap-2">
                                                <div className="flex flex-col gap-0.5 md:gap-1">
                                                    <button 
                                                        onClick={() => handleMove(index, -1)} 
                                                        disabled={index === 0} 
                                                        className="p-1 text-gray-400 hover:text-white hover:bg-white/10 rounded disabled:opacity-30 disabled:cursor-not-allowed transition-all"
                                                        title="Move Up"
                                                    >
                                                        <span className="material-symbols-rounded text-[16px] md:text-sm block">expand_less</span>
                                                    </button>
                                                    <button 
                                                        onClick={() => handleMove(index, 1)} 
                                                        disabled={index === choiceList.length - 1} 
                                                        className="p-1 text-gray-400 hover:text-white hover:bg-white/10 rounded disabled:opacity-30 disabled:cursor-not-allowed transition-all"
                                                        title="Move Down"
                                                    >
                                                        <span className="material-symbols-rounded text-[16px] md:text-sm block">expand_more</span>
                                                    </button>
                                                </div>
                                                <button 
                                                    onClick={() => handleRemoveFromList(index)} 
                                                    className="p-2 text-gray-400 hover:text-red-400 hover:bg-red-400/10 rounded-xl transition-colors ml-1 md:ml-2"
                                                    title="Remove from list"
                                                >
                                                    <span className="material-symbols-rounded text-[20px] md:text-[24px]">delete</span>
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Results Dashboard */}
                    {rank && results.length > 0 && (
                        <div className="w-full max-w-6xl">
                            <div className="flex items-center justify-between mb-6 px-2 border-b border-white/10 pb-4">
                                <h2 className="text-2xl font-semibold flex items-center gap-3">
                                    <span className="material-symbols-rounded text-cyan-400 p-2 bg-cyan-400/10 rounded-lg">analytics</span>
                                    Probability Analysis
                                </h2>
                                <span className="px-4 py-1.5 bg-white/5 rounded-full text-sm font-medium border border-white/10">
                                    {results.length} Options Found
                                </span>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                                {results.map((item, index) => {
                                    const inList = choiceList.some(c => c.uni === item.uni && c.dept === item.dept);

                                    return (
                                        <div 
                                            key={index} 
                                            className="glass-panel rounded-[1.25rem] p-5 transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_15px_40px_-15px_rgba(6,182,212,0.4)] relative overflow-hidden group flex flex-col h-full"
                                        >
                                            <div 
                                                className="absolute bottom-0 left-0 h-1.5 bg-gradient-to-r from-teal-400 to-indigo-500 transition-all duration-1000 ease-out"
                                                style={{ width: `${item.prob}%`, opacity: 0.8 }}
                                            ></div>

                                            <div className="flex justify-between items-start mb-5">
                                                <div className="pr-2">
                                                    <h3 className="text-xl font-bold text-white mb-1.5 group-hover:text-cyan-300 transition-colors leading-tight">
                                                        {item.dept}
                                                    </h3>
                                                    <p className="text-gray-400 text-xs flex items-center gap-1.5 font-medium">
                                                        <span className="material-symbols-rounded text-[14px]">assured_workload</span>
                                                        {item.uni}
                                                    </p>
                                                </div>
                                                <div className={`px-2.5 py-1 rounded-xl text-sm font-bold border ${item.bg} ${item.color} ${item.border} shadow-sm`}>
                                                    {item.prob}%
                                                </div>
                                            </div>

                                            <div className="mt-auto pt-4 border-t border-white/5 grid grid-cols-2 gap-4 mb-4">
                                                <div>
                                                    <span className="text-[10px] text-gray-500 uppercase tracking-widest block mb-0.5">Status</span>
                                                    <span className={`text-sm font-semibold ${item.color}`}>{item.status}</span>
                                                </div>
                                                <div className="text-right">
                                                    <span className="text-[10px] text-gray-500 uppercase tracking-widest block mb-0.5">Cutoff Rank</span>
                                                    <span className="text-sm font-bold text-gray-200">#{item.cutoff.toLocaleString()}</span>
                                                </div>
                                            </div>

                                            {/* Add to List Button */}
                                            <button 
                                                onClick={() => handleAddToList(item)}
                                                disabled={inList}
                                                className={`w-full py-2.5 mt-2 rounded-xl flex items-center justify-center gap-2 text-sm font-semibold transition-all ${
                                                    inList 
                                                    ? 'bg-white/5 text-gray-500 cursor-not-allowed border border-transparent' 
                                                    : 'bg-purple-500/10 text-purple-400 hover:bg-purple-500/20 border border-purple-500/30 hover:border-purple-500/50'
                                                }`}
                                            >
                                                <span className="material-symbols-rounded text-[18px]">
                                                    {inList ? 'check_circle' : 'add_circle'}
                                                </span>
                                                {inList ? 'Added to List' : 'Add to Choice List'}
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {/* Empty State */}
                    {rank && results.length === 0 && (
                        <div className="glass-panel rounded-3xl p-12 text-center max-w-md mx-auto mt-10 animate-float">
                            <span className="material-symbols-rounded text-6xl text-gray-600 mb-4 block">search_off</span>
                            <h3 className="text-xl font-bold text-white mb-2">No Matches Found</h3>
                            <p className="text-gray-400 text-sm">
                                Try adjusting your filters or checking a different merit position to see available subjects.
                            </p>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="mt-24 mb-8 text-center text-gray-500 text-sm w-full max-w-4xl border-t border-white/10 pt-8">
                        <div className="flex items-center justify-center gap-2 mb-2">
                            <span className="material-symbols-rounded text-[18px]">copyright</span>
                            <span>2026 Developed by <span className="text-cyan-400/80 font-medium hover:text-cyan-400 cursor-pointer transition-colors">Urfa Hasan Fattah</span></span>
                        </div>
                        <p className="text-xs opacity-75">Data compiled from GST sessions. Predictions are statistical estimates and not official guarantees.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
