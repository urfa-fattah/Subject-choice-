<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniPro v3.1 | Multi-Vector Neural Merit Predictor</title>
    <script src="https://cdn.tailwindcss.com">

    <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js">
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    animation: {
                        'gradient-x': 'gradient-x 20s ease infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                        'scale-in': 'scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'dropdown-in': 'dropdownIn 0.2s ease-out forwards',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' }
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-12px)' }
                        },
                        'slideUp': {
                            '0%': { transform: 'translateY(100%)', opacity: 0 },
                            '100%': { transform: 'translateY(0)', opacity: 1 }
                        },
                        'scaleIn': {
                            '0%': { transform: 'scale(0.95)', opacity: 0 },
                            '100%': { transform: 'scale(1)', opacity: 1 }
                        },
                        'dropdownIn': {
                            '0%': { transform: 'translateY(-8px)', opacity: 0 },
                            '100%': { transform: 'translateY(0)', opacity: 1 }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #050505;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(20, 184, 166, 0.1), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(99, 102, 241, 0.1), transparent 25%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
        }
        .glass-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        select option {
            background-color: #0f172a;
            color: white;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.4);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(20, 184, 166, 0.5);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(20, 184, 166, 0.9);
        }
        .chat-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .drag-over {
            border: 2px dashed #6366f1 !important;
            background: rgba(99, 102, 241, 0.1) !important;
            transform: scale(1.02);
        }
        .chart-bar {
            transition: height 1s ease-out;
        }
        .multi-select-dropdown {
            max-height: 280px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(20, 184, 166, 0.5) rgba(0, 0, 0, 0.4);
        }
        .multi-select-dropdown::-webkit-scrollbar {
            width: 4px;
        }
        .multi-select-dropdown::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }
        .multi-select-dropdown::-webkit-scrollbar-thumb {
            background: rgba(20, 184, 166, 0.4);
            border-radius: 8px;
        }
        .checkbox-custom {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            position: relative;
        }
        .checkbox-custom:checked {
            background: #14b8a6;
            border-color: #14b8a6;
        }
        .checkbox-custom:checked::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 1px;
            width: 5px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        .checkbox-custom:hover {
            border-color: rgba(20, 184, 166, 0.6);
        }
        .quick-link-btn {
            transition: all 0.2s;
        }
        .quick-link-btn:hover {
            transform: scale(1.05);
        }
        .research-badge {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.25);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, memo, useRef, useCallback } = React;

        // --- Core Logic ---
        const calculateProbability = (userRank, cutoff) => {
            if (!userRank || userRank <= 0) return { prob: 0, status: "Invalid", color: "text-gray-500", bg: "bg-gray-500/10",
                border: "border-gray-500/30", variance: 0 };
            const ratio = userRank / cutoff;
            const variance = cutoff - userRank;
            let result = { prob: 0, status: "Unlikely", color: "text-gray-500", bg: "bg-gray-500/10",
                border: "border-gray-500/30", type: 'none', variance };

            if (ratio <= 0.60) result = { prob: 99, status: "Guaranteed", color: "text-emerald-400", bg: "bg-emerald-400/10",
                    border: "border-emerald-400/30", type: 'safe', variance };
            else if (ratio <= 0.85) result = { prob: 88, status: "Highly Likely", color: "text-green-400",
                    bg: "bg-green-400/10", border: "border-green-400/30", type: 'safe', variance };
            else if (ratio <= 0.95) result = { prob: 72, status: "Likely", color: "text-lime-400", bg: "bg-lime-400/10",
                    border: "border-lime-400/30", type: 'safe', variance };
            else if (ratio <= 1.00) result = { prob: 55, status: "Borderline", color: "text-yellow-400",
                    bg: "bg-yellow-400/10", border: "border-yellow-400/30", type: 'borderline', variance };
            else if (ratio <= 1.05) result = { prob: 35, status: "Waiting List", color: "text-orange-400",
                    bg: "bg-orange-400/10", border: "border-orange-400/30", type: 'risk', variance };
            else if (ratio <= 1.15) result = { prob: 12, status: "Low Chance", color: "text-red-400", bg: "bg-red-400/10",
                    border: "border-red-400/30", type: 'risk', variance };

            return result;
        };

        // --- Reusable UI Components ---
        const Toast = ({ message, type, onClose }) => ( <
            div className = { `fixed bottom-6 left-1/2 -translate-x-1/2 md:translate-x-0 md:left-auto md:right-6 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 z-[60] animate-slide-up ${
                type === 'success' ? 'bg-emerald-500/20 text-emerald-100 border border-emerald-500/50 backdrop-blur-xl' : 
                type === 'error' ? 'bg-red-500/20 text-red-100 border border-red-500/50 backdrop-blur-xl' :
                'bg-indigo-500/20 text-indigo-100 border border-indigo-500/50 backdrop-blur-xl'
            }` } >
                <
                span className = "material-symbols-rounded" > { type === 'success' ? 'check_circle' : type === 'error' ? 'error' :
                        'info' } < /span> <
                p className = "font-medium text-sm whitespace-nowrap" > { message } < /p> <
                button onClick = { onClose }
                className = "ml-2 hover:opacity-70" > < span className = "material-symbols-rounded text-sm block" > close < /span></button >
                <
                /div>
            );

            // --- NOTICE MODAL ---
            const NoticeModal = ({ isOpen, onClose }) => {
                const [activeTab, setActiveTab] = useState('all');
                const [notices, setNotices] = useState({ texts: [], images: [], pdfs: [] });
                const [loading, setLoading] = useState(true);

                useEffect(() => {
                    if (isOpen) {
                        setLoading(true);
                        fetch('./notice.json').then(res => res.json()).then(data => {
                            processNoticeData(data);
                        }).catch(err => {
                            const mockData = {
                                texts: [
                                    { id: 1, title: "Welcome to UniPro v3.1",
                                        content: "Multi-subject & Multi-university filtering is now live! Select multiple universities and subjects to compare across departments.",
                                        date: "2026-05-10" },
                                    { id: 2, title: "Server Maintenance Notice",
                                        content: "Systems will be down for 2 hours on Sunday for deep-learning updates.",
                                        date: "2026-04-28" }
                                ],
                                files: [
                                    "notice_admission_guidelines_2026.pdf",
                                    "notice_campus_map_new.jpg",
                                    "notice_fee_structure.pdf",
                                    "event_notice_hackathon.png",
                                    "random_file.txt"
                                ]
                            };
                            processNoticeData(mockData);
                        });
                    }
                }, [isOpen]);

                const processNoticeData = (data) => {
                    const texts = data.texts || [];
                    const files = data.files || [];
                    const validFiles = files.filter(f => f.toLowerCase().includes('notice'));
                    const images = validFiles.filter(f => f.match(/\.(jpeg|jpg|gif|png|webp)$/i)).map((url, i) => ({
                        id: `img-${i}`,
                        title: url,
                        url: `./${url}`,
                        type: 'image' }));
                    const pdfs = validFiles.filter(f => f.match(/\.(pdf)$/i)).map((url, i) => ({ id: `pdf-${i}`,
                        title: url, url: `./${url}`, type: 'pdf' }));
                    setNotices({ texts, images, pdfs });
                    setLoading(false);
                };

                if (!isOpen) return null;

                const allItems = [
                    ...notices.texts.map(t => ({ ...t, type: 'text' })),
                    ...notices.images,
                    ...notices.pdfs
                ];
                const displayItems = activeTab === 'all' ? allItems :
                    activeTab === 'texts' ? notices.texts.map(t => ({ ...t, type: 'text' })) :
                    activeTab === 'images' ? notices.images : notices.pdfs;

                return ( <
                    div className = "fixed inset-0 bg-black/80 backdrop-blur-md z-[55] flex items-center justify-center p-4" >
                    <
                    div className = "glass-panel w-full max-w-4xl h-[80vh] rounded-3xl relative shadow-2xl border border-white/10 flex flex-col animate-scale-in" >
                    <
                    button onClick = { onClose }
                    className = "absolute top-4 right-4 p-2 text-gray-400 hover:text-white bg-white/5 hover:bg-white/10 rounded-full transition-all z-10" > < span className = "material-symbols-rounded block" > close < /span></button >

                    <
                    div className = "p-6 border-b border-white/10" >
                    <
                    h2 className = "text-2xl font-bold text-white flex items-center gap-3" >
                    <
                    span className = "material-symbols-rounded text-yellow-400" > campaign < /span> Notice Board <
                    /h2> <
                    p className = "text-gray-400 text-sm mt-1" > Official texts, PDFs, and image circulars stored
                    locally. < /p> <
                    div className = "flex gap-2 mt-6 overflow-x-auto" > {
                        ['all', 'texts', 'images', 'pdfs'].map(tab => ( <
                            button key = { tab }
                            onClick = {
                                () => setActiveTab(tab) }
                            className = { `px-4 py-2 rounded-xl text-sm font-semibold capitalize transition-all ${activeTab === tab ? 'bg-yellow-400/20 text-yellow-300 border border-yellow-400/30' : 'bg-white/5 text-gray-400 hover:text-white hover:bg-white/10'}` } >
                            { tab } <
                            /button>
                        ))
                    } <
                    /div> <
                    /div>

                    <
                    div className = "flex-1 overflow-y-auto p-6" > {
                        loading ? ( <
                            div className = "h-full flex items-center justify-center text-gray-400 animate-pulse" > < span className = "material-symbols-rounded animate-spin mr-2" > cyclone < /span> Fetching Directory...</div >
                        ) : displayItems.length === 0 ? ( <
                            div className = "h-full flex flex-col items-center justify-center text-gray-500" >
                            <
                            span className = "material-symbols-rounded text-6xl mb-2 opacity-50" > folder_off < /span> <
                            p > No notices found
                            for this category. < /p> <
                            /div>
                        ) : ( <
                            div className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" > {
                                displayItems.map((item, idx) => ( <
                                    div key = { idx }
                                    className = "bg-white/5 border border-white/10 rounded-2xl p-5 hover:bg-white/10 transition-colors flex flex-col" >
                                    <
                                    div className = "flex items-center gap-2 mb-3" >
                                    <
                                    span className = { `material-symbols-rounded text-sm p-1.5 rounded-lg ${item.type==='text'?'bg-blue-500/20 text-blue-400':item.type==='pdf'?'bg-red-500/20 text-red-400':'bg-emerald-500/20 text-emerald-400'}` } >
                                    { item.type === 'text' ? 'article' : item.type === 'pdf' ? 'picture_as_pdf' :
                                        'image' } <
                                    /span> <
                                    span className = "text-xs text-gray-400 font-medium capitalize" > { item.type } < /span> {
                                        item.date && < span className = "text-[10px] text-gray-500 ml-auto" > { item.date } < /span>} <
                                        /div> <
                                        h3 className = "text-white font-bold mb-2 truncate"
                                    title = { item.title } > { item.title } < /h3> {
                                        item.type === 'text' ? ( <
                                            p className = "text-gray-400 text-sm line-clamp-3 mb-4" > { item.content } < /p>
                                        ) : ( <
                                            p className = "text-gray-500 text-xs font-mono break-all mb-4 mt-auto" > { item.url } < /p>
                                        )
                                    } <
                                    div className = "mt-auto" > {
                                        item.type === 'text' ? ( <
                                            button className = "text-sm text-blue-400 hover:text-blue-300 font-medium" > Read
                                            Full Text → < /button>
                                        ) : ( <
                                            a href = { item.url }
                                            target = "_blank"
                                            className = { `text-sm font-medium flex items-center gap-1 ${item.type==='pdf'?'text-red-400 hover:text-red-300':'text-emerald-400 hover:text-emerald-300'}` } >
                                            View File < span className = "material-symbols-rounded text-[16px]" > open_in_new < /span> <
                                            /a>
                                        )
                                    } <
                                    /div> <
                                    /div>
                                ))
                            } <
                            /div>
                        )
                    } <
                    /div> <
                    /div> <
                    /div>
                );
            };

            // --- ENHANCED SmartSearchModal with Research Hub ---
            const SmartSearchModal = ({ isOpen, onClose, data }) => {
                const [info, setInfo] = useState({ loading: true, text: '' });
                const [activeTab, setActiveTab] = useState('overview');

                useEffect(() => {
                    if (isOpen && data) {
                        setInfo({ loading: true, text: '' });
                        fetch(
                                `https://en.wikipedia.org/w/api.php?action=query&origin=*&prop=extracts&exsentences=6&explaintext=1&titles=${encodeURIComponent(data.uni)}&format=json`
                                ).then(res => res.json()).then(resData => {
                                const pages = resData.query.pages;
                                const pageId = Object.keys(pages)[0];
                                if (pageId !== "-1" && pages[pageId].extract) {
                                    setInfo({ loading: false, text: pages[pageId].extract });
                                } else {
                                    setInfo({ loading: false,
                                        text: `Advanced intelligence indicates ${data.uni} is a highly regarded institution for ${data.dept}. Detailed historical wiki data is not directly mapped.`
                                    });
                                }
                            }).catch(() => setInfo({ loading: false,
                                text: "Unable to establish secure connection to knowledge base. Network offline." }));
                    }
                }, [isOpen, data]);

                if (!isOpen || !data) return null;

                const uniSlug = encodeURIComponent(data.uni);
                const deptSlug = encodeURIComponent(data.dept);

                const researchLinks = [
                    { label: 'Official Website', icon: 'public', url: `https://www.google.com/search?q=${uniSlug}+official+website` },
                    { label: 'Admission Info', icon: 'assignment', url: `https://www.google.com/search?q=${uniSlug}+${deptSlug}+admission+requirements` },
                    { label: 'Department Page', icon: 'school', url: `https://www.google.com/search?q=${uniSlug}+${deptSlug}+department` },
                    { label: 'Wikipedia Entry', icon: 'menu_book', url: `https://en.wikipedia.org/wiki/${uniSlug}` },
                    { label: 'Rankings & Reviews', icon: 'star', url: `https://www.google.com/search?q=${uniSlug}+ranking+reviews` },
                    { label: 'Contact & Location', icon: 'place', url: `https://www.google.com/search?q=${uniSlug}+contact+address` },
                ];

                return ( <
                    div className = "fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4" >
                    <
                    div className = "glass-panel w-full max-w-4xl h-[85vh] rounded-3xl relative shadow-2xl border border-white/10 flex flex-col animate-scale-in overflow-hidden" >
                    <
                    button onClick = { onClose }
                    className = "absolute top-4 right-4 p-2 text-gray-400 hover:text-white bg-white/5 hover:bg-white/10 rounded-full transition-all z-10" > < span className = "material-symbols-rounded block" > close < /span></button >

                    <
                    div className = "p-6 border-b border-white/10 flex-shrink-0" >
                    <
                    div className = "flex flex-col md:flex-row md:items-start md:justify-between gap-3" >
                    <
                    div >
                    <
                    h2 className = "text-2xl font-bold text-white flex items-center gap-3" >
                    <
                    span className = "material-symbols-rounded text-blue-400 p-2 bg-blue-500/10 rounded-xl" > travel_explore < /span> { data.uni } <
                    /h2> <
                    p className = "text-blue-300 text-sm font-medium mt-1 flex items-center gap-2" >
                    <
                    span className = "material-symbols-rounded text-[16px]" > school < /span> { data.dept } <
                    span className = "text-gray-500 text-xs bg-white/5 px-2 py-0.5 rounded-full ml-2" > Cutoff: #{data
                        .cutoff} < /span> <
                    /p> <
                    /div> <
                    div className = "flex gap-2 overflow-x-auto flex-shrink-0" > {
                        ['overview', 'research'].map(tab => ( <
                            button key = { tab }
                            onClick = {
                                () => setActiveTab(tab) }
                            className = { `px-4 py-1.5 rounded-xl text-sm font-semibold capitalize transition-all whitespace-nowrap ${activeTab === tab ? 'bg-indigo-500/20 text-indigo-300 border border-indigo-500/30' : 'bg-white/5 text-gray-400 hover:text-white hover:bg-white/10'}` } >
                            { tab === 'overview' ? '📖 Overview' : '🔍 Research Hub' } <
                            /button>
                        ))
                    } <
                    /div> <
                    /div> <
                    /div>

                    <
                    div className = "flex-1 overflow-y-auto p-6" > {
                        activeTab === 'overview' ? ( <
                            div className = "bg-[#09090b]/50 border border-white/5 rounded-2xl p-6 min-h-[200px]" > {
                                info.loading ? ( <
                                    div className = "flex items-center gap-3 text-gray-400 animate-pulse" > < span className = "material-symbols-rounded animate-spin" > cyclone < /span> Fetching Neural Datasets...</div >
                                ) : ( <
                                    p className = "text-gray-300 text-sm leading-relaxed" > { info.text } < /p>
                                )
                            } <
                            /div>
                        ) : ( <
                            div className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" > {
                                researchLinks.map((link, idx) => ( <
                                    a key = { idx }
                                    href = { link.url }
                                    target = "_blank"
                                    rel = "noopener noreferrer"
                                    className = "research-badge p-4 rounded-2xl flex flex-col items-center gap-2 text-center hover:bg-indigo-500/20 transition-all group" >
                                    <
                                    span className = "material-symbols-rounded text-3xl text-indigo-400 group-hover:text-indigo-300 transition-colors" > { link
                                        .icon } < /span> <
                                    span className = "text-sm font-medium text-gray-200 group-hover:text-white" > { link
                                        .label } < /span> <
                                    span className = "material-symbols-rounded text-[14px] text-gray-500 group-hover:text-gray-300" > open_in_new < /span> <
                                    /a>
                                ))
                            } <
                            /div>
                        )
                    } <
                    /div> <
                    /div> <
                    /div>
                );
            };

            // --- TrendModal ---
            const TrendModal = ({ isOpen, onClose, data }) => {
                if (!isOpen || !data) return null;
                const mockHistory = [data.cutoff - 150, data.cutoff - 50, data.cutoff + 80, data.cutoff];
                const max = Math.max(...mockHistory) + 200;

                return ( <
                    div className = "fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4" >
                    <
                    div className = "glass-panel w-full max-w-md rounded-3xl p-6 relative animate-scale-in" >
                    <
                    button onClick = { onClose }
                    className = "absolute top-4 right-4 text-gray-400 hover:text-white" > < span className = "material-symbols-rounded" > close < /span></button >
                    <
                    h3 className = "text-lg font-bold text-white mb-1" > Cutoff Trends < /h3> <
                    p className = "text-xs text-gray-400 mb-6" > { data.dept }
                    at { data.uni } < /p> <
                    div className = "flex items-end justify-between gap-4 h-48 mt-4 border-b border-white/10 pb-2" > {
                        mockHistory.map((val, i) => ( <
                            div key = { i }
                            className = "flex flex-col items-center flex-1 group" >
                            <
                            span className = "text-[10px] text-gray-400 mb-2 opacity-0 group-hover:opacity-100 transition-opacity" > #{val} < /span> <
                            div className = "w-full bg-gradient-to-t from-teal-500/20 to-teal-400/80 rounded-t-lg chart-bar relative overflow-hidden hover:to-teal-300 transition-colors"
                            style = { { height: `${(val/max)*100}%` } } >
                            <
                            div className = "absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100" > < /div> <
                            /div> <
                            span className = "text-xs font-medium text-gray-400 mt-2" > 202 { i + 2 } < /span> <
                            /div>
                        ))
                    } <
                    /div> <
                    /div> <
                    /div>
                );
            };

            // --- Research Hub Modal (standalone) ---
            const ResearchHubModal = ({ isOpen, onClose, data }) => {

                                        const inCompare = compareList.some(c => c.uni === item.uni && c.dept === item
                                            .dept);
                                        const varianceText = item.variance >= 0 ? `+${item.variance.toLocaleString()} Safe` :
                                            `${item.variance.toLocaleString()} Short`;
                                        const varianceColor = item.variance >= 0 ? 'text-emerald-400' :
                                        'text-red-400';

                                        return ( <
                                            div key = { `${item.uni}-${item.dept}` }
                                            className = { `glass-card rounded-[1.5rem] p-6 transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_15px_40px_-10px_rgba(20,184,166,0.2)] relative overflow-hidden group flex flex-col ${viewMode==='list'? 'md:flex-row md:items-center gap-4' : 'h-full'}` } >
                                            <
                                            div className = "absolute top-0 left-0 h-1.5 bg-gradient-to-r from-teal-400 to-indigo-500 transition-all duration-1000 ease-out"
                                            style = { { width: `${item.prob}%` } } > < /div>

                                            <
                                            div className = "flex justify-between items-start mb-4 mt-2 gap-2 w-full" >
                                            <
                                            div className = "pr-2" >
                                            <
                                            h3 className = "text-xl font-bold text-white mb-1.5 group-hover:text-cyan-300 transition-colors leading-tight" > { item
                                                .dept } < /h3> <
                                            p className = "text-gray-400 text-sm flex items-center gap-1.5 font-medium" >
                                            <
                                            span className = "material-symbols-rounded text-[16px]" > assured_workload <
                                            /span>{item.uni} <
                                            /p> <
                                            /div> <
                                            div className = "flex flex-col items-end gap-2" >
                                            <
                                            div className = { `px-3 py-1.5 rounded-xl text-sm font-black border ${item.bg} ${item.color} ${item.border} shadow-sm` } > { item
                                                .prob } % <
                                            /div> <
                                            /div> <
                                            /div>

                                            <
                                            div className = { `mt-auto pt-4 border-t border-white/5 grid grid-cols-2 gap-4 mb-5 w-full` } >
                                            <
                                            div >
                                            <
                                            span className = "text-[10px] text-gray-500 uppercase tracking-widest block mb-1" >
                                            Status Code <
                                            /span> <
                                            span className = { `text-sm font-bold ${item.color}` } > { item.status } < /span> <
                                            /div> <
                                            div className = "text-right" >
                                            <
                                            span className = "text-[10px] text-gray-500 uppercase tracking-widest block mb-1" >
                                            Cutoff Matrix <
                                            /span> <
                                            span className = "text-sm font-black text-gray-200" > #{item.cutoff
                                                .toLocaleString()} < /span> <
                                            span className = { `text-[11px] block mt-0.5 font-mono ${varianceColor}` } > { varianceText } <
                                            /span> <
                                            /div> <
                                            /div>

                                            <
                                            div className = "flex items-center gap-2 w-full mt-auto" >
                                            <
                                            button onClick = {
                                                () => setSearchModalData(item) }
                                            className = "p-3 rounded-xl bg-blue-500/10 text-blue-400 hover:bg-blue-500/30 border border-blue-500/20 transition-all"
                                            title = "Smart Search" >
                                            <
                                            span className = "material-symbols-rounded text-[20px] block" > neurology <
                                            /span> <
                                            /button> <
                                            button onClick = {
                                                () => setTrendModalData(item) }
                                            className = "p-3 rounded-xl bg-purple-500/10 text-purple-400 hover:bg-purple-500/30 border border-purple-500/20 transition-all"
                                            title = "Historical Trends" >
                                            <
                                            span className = "material-symbols-rounded text-[20px] block" > monitoring <
                                            /span> <
                                            /button> <
                                            button onClick = {
                                                () => setResearchHubData(item) }
                                            className = "p-3 rounded-xl bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500/30 border border-emerald-500/20 transition-all"
                                            title = "Research Hub" >
                                            <
                                            span className = "material-symbols-rounded text-[20px] block" > database <
                                            /span> <
                                            /button>

                                            <
                                            button onClick = {
                                                () => toggleCompare(item) }
                                            className = { `p-3 rounded-xl border transition-all ${inCompare ? 'bg-indigo-500 text-white border-indigo-400' : 'bg-white/5 text-gray-400 hover:bg-white/10 border-white/10'}` } >
                                            <
                                            span className = "material-symbols-rounded text-[20px] block" > compare_arrows <
                                            /span> <
                                            /button>

                                            <
                                            button onClick = {
                                                () => handleAddToList(item) }
                                            disabled = { inList }
                                            className = { `flex-1 py-3 rounded-xl flex items-center justify-center gap-2 text-sm font-bold transition-all shadow-sm ${
                                                    inList ? 'bg-white/5 text-gray-500 cursor-not-allowed border border-transparent' : 'bg-gradient-to-r from-teal-500/20 to-emerald-500/20 text-emerald-300 hover:from-teal-500/30 hover:to-emerald-500/30 border border-emerald-500/30 hover:border-emerald-500/60'
                                                }` } >
                                            <
                                            span className = "material-symbols-rounded text-[20px]" > { inList ?
                                                'check_circle' : 'add_circle' } <
                                            /span> { inList ? 'Pipeline' : 'Add Node' } <
                                            /button> <
                                            /div> <
                                            /div>
                                        );
                                    })
                                } <
                                /div> <
                                /div>
                            )
                        }

                        { /* Empty State */ } {
                            rank && results.length === 0 && ( <
                                div className = "glass-panel rounded-[2rem] p-12 text-center max-w-md mx-auto mt-10 border border-red-500/20 shadow-[0_0_30px_-10px_rgba(239,68,68,0.2)]" >
                                <
                                span className = "material-symbols-rounded text-7xl text-red-400/50 mb-5 block" > blur_off <
                                /span> <
                                h3 className = "text-2xl font-bold text-white mb-3" > Zero Vectors Found < /h3> <
                                p className = "text-gray-400 text-sm leading-relaxed" > Modify search parameters or
                                shift your current merit position to recalculate the probability matrix. <
                                br / > < span className = "text-teal-400" > Tip: Enable "Showing 0 % Prob"
                                    to see all subjects. < /span> <
                                /p> <
                                /div>
                            )
                        }

                        <
                        footer className = "mt-32 mb-8 text-center text-gray-500 text-sm w-full max-w-4xl border-t border-white/5 pt-10" >
                        <
                        div className = "flex items-center justify-center gap-2 mb-3" >
                        <
                        span className = "material-symbols-rounded text-[20px]" > terminal < /span> <
                        span className = "font-light" > System Architecture by < span className = "text-teal-400 font-bold hover:text-teal-300 cursor-pointer transition-colors" >
                        Urfa Hasan Fattah < /span></span >
                        <
                        /div> <
                        p className = "text-[11px] uppercase tracking-widest opacity-40 font-medium" > Predictive
                        Neural Models·Dynamic Matrix Allocation·v3 .1 Premium Build·Multi-University &
                        Multi-Subject Engine < /p> <
                        /footer> <
                        /div>
                    );
                };

                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render( < App / > );
    </script>
</body>
</html>
